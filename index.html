<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lollipop Leap - Free HTML5 Game</title>
  <meta name="description" content="Play Lollipop Leap - Swipe to launch a bouncing ball through multiplying lollipop barriers in a sweet maze.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a0a2e">
  <meta property="og:title" content="Lollipop Leap - Free HTML5 Game">
  <meta property="og:description" content="Play Lollipop Leap - Swipe to launch a bouncing ball through multiplying lollipop barriers in a sweet maze.">
  <meta property="og:url" content="https://balinti.github.io/lollipop-leap/">
  <meta property="og:image" content="https://balinti.github.io/lollipop-leap/og-image.png">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://balinti.github.io/lollipop-leap/">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4099346100621490" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0d0718;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    #wrap {
      position: relative;
      width: min(420px, 100vw);
      height: min(750px, 100svh);
      aspect-ratio: 420 / 750;
      max-width: 420px;
      max-height: 750px;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(200,100,255,0.3);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #seo-text {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }
    #share-btn {
      display: none;
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 28px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      backdrop-filter: blur(6px);
      z-index: 10;
      white-space: nowrap;
    }
    #share-btn:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
    <button id="share-btn">Share Score</button>
  </div>

  <section id="seo-text" aria-label="Game description">
    <h1>Lollipop Leap - Tap Gate Game</h1>
    <p>Tap to flip gate lanes. Guide your ball through golden lollipop gates. How far can you go? Controls: Tap, click, or press Space/Enter to flip the next gate. Score combos to unlock Golden Gates worth 10 points!</p>
  </section>

<script>
'use strict';
(() => {
  // ---- Constants ----
  const HS_KEY = 'll_tapgate_hs_v1';
  const CANVAS_W = 420, CANVAS_H = 750;
  const LANE_L = 0, LANE_R = 1;
  const GATE_H = 18;
  const GAP_W = 150;
  const BALL_R = 16;
  const COMBO_MAX = 5;
  const RETRY_LOCKOUT = 0.9;
  const BALL_Y = CANVAS_H - 100;

  // ---- Setup ----
  const wrap = document.getElementById('wrap');
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const shareBtn = document.getElementById('share-btn');
  const DPR = Math.min(window.devicePixelRatio || 1, 3);

  function resizeCanvas() {
    const rect = wrap.getBoundingClientRect();
    canvas.width = rect.width * DPR;
    canvas.height = rect.height * DPR;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
  }
  resizeCanvas();
  new ResizeObserver(resizeCanvas).observe(wrap);

  // Logical -> canvas pixel coords
  function lx(x) { return x / CANVAS_W * canvas.width; }
  function ly(y) { return y / CANVAS_H * canvas.height; }
  function ls(s) { return s / CANVAS_W * canvas.width; }

  // ---- Game State ----
  let state = 'start';
  let score = 0;
  let bestScore = parseInt(localStorage.getItem(HS_KEY) || '0');
  let t = 0;
  let retryTimer = 0;

  // Ball
  let ballLane = LANE_L;
  let ballX = CANVAS_W * 0.25;
  let ballSplat = false;

  // Gates
  let gates = [];
  let gateSpeed = 120;
  let gateSpawnTimer = 0;
  let gateSpawnInterval = 2.0;

  // Combo
  let combo = 0;
  let comboFlash = 0;
  let goldenNext = false;

  // Particles
  let particles = [];

  // Screen shake
  let trauma = 0;

  // Visual
  let bgHue = 260;

  // Input
  let pendingTap = false;

  // ---- Helpers ----
  function roundRect(cx, x, y, w, h, r) {
    if (w <= 0) return;
    r = Math.min(r, w / 2, h / 2);
    cx.beginPath();
    cx.moveTo(x + r, y);
    cx.lineTo(x + w - r, y);
    cx.quadraticCurveTo(x + w, y, x + w, y + r);
    cx.lineTo(x + w, y + h - r);
    cx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    cx.lineTo(x + r, y + h);
    cx.quadraticCurveTo(x, y + h, x, y + h - r);
    cx.lineTo(x, y + r);
    cx.quadraticCurveTo(x, y, x + r, y);
    cx.closePath();
  }

  // ---- Gate factory ----
  function makeGate(y) {
    let type = 'normal';
    if (score >= 46) {
      type = Math.random() < 0.4 ? 'feint' : 'normal';
    } else if (score >= 26) {
      type = Math.random() < 0.3 ? 'locked' : 'normal';
    }
    return {
      y,
      openLane: Math.random() < 0.5 ? LANE_L : LANE_R,
      type,
      isGolden: false,
      feintPhase: 0,
      feintDone: false,
      feintOriginalLane: LANE_L,
      passed: false,
      wobble: 0,
    };
  }

  function spawnGate() {
    const useDouble = score >= 11 && score <= 25 && Math.random() < 0.3;
    if (useDouble) {
      const g1 = makeGate(-40);
      const g2 = makeGate(-40 - ls(90) / (canvas.height / CANVAS_H) + 90);
      gates.push(g1);
      gates.push(g2);
      if (goldenNext) { g1.isGolden = true; goldenNext = false; }
    } else {
      const g = makeGate(-40);
      if (goldenNext) { g.isGolden = true; goldenNext = false; }
      gates.push(g);
    }
  }

  function resetGame() {
    score = 0;
    t = 0;
    ballLane = Math.random() < 0.5 ? LANE_L : LANE_R;
    ballX = ballLane === LANE_L ? CANVAS_W * 0.25 : CANVAS_W * 0.75;
    ballSplat = false;
    gates = [];
    particles = [];
    trauma = 0;
    combo = 0;
    comboFlash = 0;
    goldenNext = false;
    gateSpawnTimer = 1.0; // first gate soon
    gateSpawnInterval = 2.0;
    gateSpeed = 120;
    bgHue = 260;
    shareBtn.style.display = 'none';
    pendingTap = false;
  }

  // ---- Particles ----
  function spawnParticles(x, y, count, h, type) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i / count) + Math.random() * 0.6;
      const speed = 60 + Math.random() * 160;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (type === 'confetti' ? 80 : 0),
        life: 1,
        decay: 0.8 + Math.random() * 0.7,
        r: type === 'confetti' ? 5 + Math.random() * 5 : 3 + Math.random() * 4,
        hue: h + Math.random() * 40 - 20,
        type,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 10,
      });
    }
  }

  function spawnSplat(x, y) {
    for (let i = 0; i < 28; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 80 + Math.random() * 220;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 60,
        life: 1,
        decay: 1.0 + Math.random() * 1.2,
        r: 4 + Math.random() * 9,
        hue: 350 + Math.random() * 20,
        type: 'splat',
        rot: 0, rotV: 0,
      });
    }
  }

  // ---- Gate flip ----
  function flipNextGate() {
    // Find the lowest gate (highest y) that hasn't passed and isn't locked
    let target = null;
    for (let i = 0; i < gates.length; i++) {
      const g = gates[i];
      if (!g.passed && g.type !== 'locked') {
        if (target === null || g.y > target.y) {
          target = g;
        }
      }
    }
    if (target) {
      target.openLane = target.openLane === LANE_L ? LANE_R : LANE_L;
      target.wobble = 0.25;
    }
  }

  // ---- Difficulty ----
  function updateDifficulty() {
    gateSpeed = Math.min(340, 120 + score * 3);
    gateSpawnInterval = Math.max(0.7, 2.0 - score * 0.028);
  }

  // ---- Update ----
  function update(dt) {
    t += dt;
    bgHue = (bgHue + dt * 6) % 360;
    trauma = Math.max(0, trauma - dt * 2.8);
    comboFlash = Math.max(0, comboFlash - dt * 2.5);

    if (state === 'playing') {
      updateDifficulty();

      // Spawn gates
      gateSpawnTimer += dt;
      if (gateSpawnTimer >= gateSpawnInterval) {
        gateSpawnTimer = 0;
        spawnGate();
      }

      // Move gates downward
      for (const g of gates) {
        g.y += gateSpeed * dt;
        if (g.wobble > 0) g.wobble = Math.max(0, g.wobble - dt * 3);

        // Feint: wobble toward wrong lane early, then snap back
        if (g.type === 'feint' && !g.feintDone) {
          g.feintPhase += dt;
          // starts wobbling when gate is about 200px above ball
          if (g.y > BALL_Y - 200 && g.feintPhase < 0.5) {
            // temporarily show wrong lane
            g.feintOriginalLane = g.openLane;
          }
          if (g.feintPhase >= 0.5) {
            g.feintDone = true;
          }
        }

        // Check collision
        if (!g.passed && g.y >= BALL_Y - GATE_H / 2 && g.y <= BALL_Y + BALL_R * 1.5) {
          g.passed = true;
          if (ballLane === g.openLane) {
            // Success
            const pts = g.isGolden ? 10 : 1;
            score += pts;
            combo++;
            comboFlash = 1;
            if (combo >= COMBO_MAX) {
              combo = 0;
              goldenNext = true;
            }
            const gx = g.openLane === LANE_L ? CANVAS_W * 0.25 : CANVAS_W * 0.75;
            spawnParticles(gx, BALL_Y, g.isGolden ? 22 : 10, g.isGolden ? 45 : bgHue, g.isGolden ? 'confetti' : 'pass');
          } else {
            // Fail
            ballSplat = true;
            trauma = 1;
            spawnSplat(ballX, BALL_Y);
            if (score > bestScore) {
              bestScore = score;
              localStorage.setItem(HS_KEY, String(bestScore));
            }
            state = 'gameover';
            retryTimer = 0;
            shareBtn.style.display = 'block';
          }
        }
      }

      // Remove off-screen gates
      gates = gates.filter(g => g.y < CANVAS_H + 80);

      // Handle tap
      if (pendingTap) {
        pendingTap = false;
        flipNextGate();
      }
    }

    if (state === 'gameover') {
      retryTimer += dt;
    }

    // Update particles
    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 260 * dt;
      p.life -= p.decay * dt;
      p.rot += p.rotV * dt;
    }
    particles = particles.filter(p => p.life > 0);
  }

  // ---- Draw ----
  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.save();

    // Screen shake
    if (trauma > 0) {
      const s = trauma * trauma;
      ctx.translate(
        s * (Math.random() * 2 - 1) * ls(16),
        s * (Math.random() * 2 - 1) * ls(16)
      );
    }

    // Background
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, `hsl(${bgHue},55%,7%)`);
    grad.addColorStop(1, `hsl(${(bgHue + 50) % 360},45%,11%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Lane divider
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = ls(1.5);
    ctx.setLineDash([ls(14), ls(14)]);
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Gates
    for (const g of gates) drawGate(g);

    // Ball
    if (!ballSplat) drawBall();

    // Particles
    drawParticles();

    // HUD
    if (state !== 'start') drawHUD();

    // Screens
    if (state === 'start') drawStart();
    else if (state === 'gameover') drawGameover();

    ctx.restore();
  }

  function drawBall() {
    const bx = lx(ballX);
    const by = ly(BALL_Y);
    const br = ls(BALL_R);

    // Outer glow
    const glowGrad = ctx.createRadialGradient(bx, by, 0, bx, by, br * 2.5);
    glowGrad.addColorStop(0, `hsla(${bgHue + 40},100%,75%,0.45)`);
    glowGrad.addColorStop(1, `hsla(${bgHue + 40},100%,75%,0)`);
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(bx, by, br * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Stick
    ctx.strokeStyle = `hsl(${bgHue + 20},60%,45%)`;
    ctx.lineWidth = ls(3.5);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(bx, by + br * 0.8);
    ctx.lineTo(bx, by + br + ls(16));
    ctx.stroke();

    // Ball
    const ballGrad = ctx.createRadialGradient(bx - br * 0.28, by - br * 0.28, 0, bx, by, br);
    ballGrad.addColorStop(0, `hsl(${bgHue + 70},100%,88%)`);
    ballGrad.addColorStop(0.5, `hsl(${bgHue + 30},95%,65%)`);
    ballGrad.addColorStop(1, `hsl(${bgHue + 10},85%,45%)`);
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(bx, by, br, 0, Math.PI * 2);
    ctx.fill();

    // Candy swirl lines
    ctx.save();
    ctx.clip();
    ctx.strokeStyle = `hsla(${bgHue + 120},80%,75%,0.35)`;
    ctx.lineWidth = ls(2.5);
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(bx, by, br * (0.3 + i * 0.28), Math.PI * 0.1 + i * 0.4, Math.PI * 0.7 + i * 0.4);
      ctx.stroke();
    }
    ctx.restore();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.ellipse(bx - br * 0.26, by - br * 0.26, br * 0.3, br * 0.18, -0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawGate(g) {
    const gy = ly(g.y);
    const gh = ls(GATE_H);
    const totalW = canvas.width;
    const halfGap = ls(GAP_W) / 2;
    const cx = totalW / 2;

    // Feint: show wobble before snap
    let displayLane = g.openLane;
    if (g.type === 'feint' && !g.feintDone && g.feintPhase < 0.4) {
      // Wobble offset
      const wo = Math.sin(g.feintPhase * Math.PI * 5) * ls(18);
      // draw with offset to suggest wrong lane
      ctx.save();
      ctx.translate(wo, 0);
    }

    const openL = displayLane === LANE_L;
    const leftEnd = openL ? cx - halfGap : cx + halfGap;
    const rightStart = openL ? cx + halfGap : cx - halfGap;

    const locked = g.type === 'locked';
    const gateHue = g.isGolden ? 45 : (bgHue + 160) % 360;
    const gateColor = locked
      ? 'hsl(0,0%,60%)'
      : g.isGolden
        ? `hsl(45,100%,58%)`
        : `hsl(${gateHue},78%,58%)`;
    const glowA = locked ? 0.2 : g.isGolden ? 0.7 : 0.4;

    ctx.save();
    ctx.shadowColor = g.isGolden
      ? `rgba(255,200,0,${glowA})`
      : locked
        ? `rgba(150,150,150,${glowA})`
        : `hsla(${gateHue},80%,65%,${glowA})`;
    ctx.shadowBlur = ls(g.isGolden ? 20 : 10);

    // Left bar
    if (leftEnd > 0) {
      ctx.fillStyle = gateColor;
      roundRect(ctx, 0, gy - gh / 2, leftEnd, gh, ls(7));
      ctx.fill();
    }

    // Right bar
    if (rightStart < totalW) {
      ctx.fillStyle = gateColor;
      roundRect(ctx, rightStart, gy - gh / 2, totalW - rightStart, gh, ls(7));
      ctx.fill();
    }

    ctx.shadowBlur = 0;

    // Candy stripes
    if (!locked && !g.isGolden) {
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#fff';
      const sw = ls(12);
      // clip to bars
      if (leftEnd > 0) {
        ctx.save();
        roundRect(ctx, 0, gy - gh / 2, leftEnd, gh, ls(7));
        ctx.clip();
        for (let sx = 0; sx < leftEnd; sx += sw * 2.5) {
          ctx.fillRect(sx, gy - gh / 2, sw, gh);
        }
        ctx.restore();
      }
      if (rightStart < totalW) {
        ctx.save();
        roundRect(ctx, rightStart, gy - gh / 2, totalW - rightStart, gh, ls(7));
        ctx.clip();
        for (let sx = rightStart; sx < totalW; sx += sw * 2.5) {
          ctx.fillRect(sx, gy - gh / 2, sw, gh);
        }
        ctx.restore();
      }
      ctx.restore();
    }

    // Golden shimmer dots
    if (g.isGolden) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      for (let i = 0; i < 6; i++) {
        const px = (i / 5) * Math.min(leftEnd, totalW);
        const py = gy + Math.sin(t * 5 + i) * ls(3);
        ctx.beginPath();
        ctx.arc(px, py, ls(2), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Arrow indicator
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = `bold ${ls(16)}px sans-serif`;
    ctx.textBaseline = 'middle';
    if (openL) {
      ctx.textAlign = 'left';
      ctx.fillText('◀', lx(8), gy);
    } else {
      ctx.textAlign = 'right';
      ctx.fillText('▶', lx(CANVAS_W - 8), gy);
    }

    // Locked icons
    if (locked) {
      ctx.font = `${ls(14)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('🔒', cx / 2, gy);
      ctx.fillText('🔒', cx + (totalW - cx) / 2, gy);
    }

    ctx.restore();

    if (g.type === 'feint' && !g.feintDone && g.feintPhase < 0.4) {
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      if (p.type === 'confetti') {
        ctx.translate(lx(p.x), ly(p.y));
        ctx.rotate(p.rot);
        ctx.fillStyle = `hsl(${p.hue},90%,62%)`;
        ctx.fillRect(-ls(p.r / 2), -ls(p.r / 4), ls(p.r), ls(p.r / 2));
      } else {
        ctx.fillStyle = `hsl(${p.hue},85%,62%)`;
        ctx.beginPath();
        ctx.arc(lx(p.x), ly(p.y), ls(p.r), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawHUD() {
    const W = canvas.width, H = canvas.height;

    // Score
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.shadowColor = `hsl(${bgHue + 60},80%,65%)`;
    ctx.shadowBlur = ls(18);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${ls(40)}px sans-serif`;
    ctx.fillText(score, W / 2, ly(16));
    ctx.shadowBlur = 0;
    ctx.font = `${ls(13)}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fillText('BEST ' + bestScore, W / 2, ly(62));
    ctx.restore();

    // Combo meter
    const mx = lx(CANVAS_W / 2 - 55);
    const my = ly(CANVAS_H - 38);
    const mw = lx(110);
    const mh = ls(7);
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    roundRect(ctx, mx, my, mw, mh, ls(4));
    ctx.fill();
    if (combo > 0) {
      ctx.fillStyle = comboFlash > 0 ? 'hsl(45,100%,65%)' : `hsl(${(bgHue + 120) % 360},82%,62%)`;
      roundRect(ctx, mx, my, mw * (combo / COMBO_MAX), mh, ls(4));
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = `${ls(10)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('COMBO ' + combo + '/' + COMBO_MAX, W / 2, my - ls(2));
    ctx.restore();

    // Lane indicator dots
    const dotY = ly(BALL_Y + BALL_R + 20);
    const dotR = ls(5);
    ctx.save();
    ctx.fillStyle = ballLane === LANE_L ? `hsl(${bgHue + 60},100%,72%)` : 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(lx(CANVAS_W * 0.25), dotY, dotR, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = ballLane === LANE_R ? `hsl(${bgHue + 60},100%,72%)` : 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(lx(CANVAS_W * 0.75), dotY, dotR, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawStart() {
    const W = canvas.width, H = canvas.height;
    ctx.save();
    ctx.fillStyle = 'rgba(8,3,18,0.68)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Title
    ctx.shadowColor = `hsl(${bgHue},100%,72%)`;
    ctx.shadowBlur = ls(32);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${ls(50)}px sans-serif`;
    ctx.fillText('🍭', W / 2, H * 0.28);
    ctx.font = `bold ${ls(44)}px sans-serif`;
    ctx.fillText('Lollipop Leap', W / 2, H * 0.38);
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = `${ls(17)}px sans-serif`;
    ctx.fillText('Tap to flip the gate', W / 2, H * 0.52);
    ctx.fillText('Match the open lane!', W / 2, H * 0.52 + ls(27));

    // Controls hint
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font = `${ls(13)}px sans-serif`;
    ctx.fillText('Tap / Click / Space / Enter', W / 2, H * 0.62);

    // Pulsing prompt
    const pulse = 0.65 + 0.35 * Math.sin(t * 2.8);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = `hsl(${(bgHue + 60) % 360},100%,76%)`;
    ctx.font = `bold ${ls(23)}px sans-serif`;
    ctx.fillText('TAP TO START', W / 2, H * 0.76);
    ctx.globalAlpha = 1;

    if (bestScore > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = `${ls(14)}px sans-serif`;
      ctx.fillText('Best: ' + bestScore, W / 2, H * 0.83);
    }
    ctx.restore();
  }

  function drawGameover() {
    const W = canvas.width, H = canvas.height;
    ctx.save();
    ctx.fillStyle = 'rgba(4,1,12,0.8)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.font = `${ls(58)}px sans-serif`;
    ctx.fillText('💥', W / 2, H * 0.27);

    ctx.shadowColor = '#ff2255';
    ctx.shadowBlur = ls(28);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${ls(42)}px sans-serif`;
    ctx.fillText('GAME OVER', W / 2, H * 0.41);
    ctx.shadowBlur = 0;

    ctx.fillStyle = `hsl(${(bgHue + 60) % 360},100%,76%)`;
    ctx.font = `bold ${ls(68)}px sans-serif`;
    ctx.fillText(score, W / 2, H * 0.555);

    const newBest = score > 0 && score >= bestScore;
    ctx.fillStyle = 'rgba(255,255,255,0.52)';
    ctx.font = `${ls(16)}px sans-serif`;
    ctx.fillText(newBest ? '🏆 NEW BEST!' : 'Best: ' + bestScore, W / 2, H * 0.635);

    if (retryTimer >= RETRY_LOCKOUT) {
      const pulse = 0.65 + 0.35 * Math.sin(t * 2.8);
      ctx.globalAlpha = pulse;
      ctx.fillStyle = `hsl(${(bgHue + 60) % 360},100%,76%)`;
      ctx.font = `bold ${ls(22)}px sans-serif`;
      ctx.fillText('TAP TO RETRY', W / 2, H * 0.82);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.font = `${ls(14)}px sans-serif`;
      ctx.fillText('...', W / 2, H * 0.82);
    }

    ctx.restore();
  }

  // ---- Input ----
  function handleTap() {
    if (state === 'start') {
      resetGame();
      state = 'playing';
    } else if (state === 'gameover') {
      if (retryTimer >= RETRY_LOCKOUT) {
        resetGame();
        state = 'playing';
      }
    } else if (state === 'playing') {
      pendingTap = true;
    }
  }

  canvas.addEventListener('pointerdown', e => { e.preventDefault(); handleTap(); });
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); handleTap(); }
  });

  shareBtn.addEventListener('click', async e => {
    e.stopPropagation();
    const url = `https://balinti.github.io/lollipop-leap/?challenge=${score}`;
    const text = `I scored ${score} in Lollipop Leap! Can you beat me? 🍭`;
    if (navigator.share) {
      try { await navigator.share({ title: 'Lollipop Leap', text, url }); } catch (_) {}
    } else {
      try {
        await navigator.clipboard.writeText(`${text} ${url}`);
        const orig = shareBtn.textContent;
        shareBtn.textContent = 'Copied!';
        setTimeout(() => { shareBtn.textContent = orig; }, 2000);
      } catch (_) {}
    }
  });

  // ---- Loop ----
  let lastTime = null;
  function loop(ts) {
    if (lastTime === null) lastTime = ts;
    const dt = Math.min((ts - lastTime) / 1000, 0.033);
    lastTime = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
